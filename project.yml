name: Watt
options:
  bundleIdPrefix: com.grahamgilbert
  deploymentTarget:
    macOS: "26.0"
  developmentLanguage: en
  groupSortPosition: top
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    CLANG_ENABLE_MODULES: YES
    ENABLE_HARDENED_RUNTIME: YES
    DEAD_CODE_STRIPPING: YES
    OTHER_SWIFT_FLAGS: "$(inherited)"
    DEVELOPMENT_TEAM: 9D8XP85393

packages:
  WattCore:
    path: WattCore
  WattHelperProtocol:
    path: WattHelperProtocol

targets:
  Watt:
    type: application
    platform: macOS
    sources:
      - path: Watt
        excludes:
          - Library/**
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.grahamgilbert.watt
        PRODUCT_NAME: Watt
        INFOPLIST_FILE: Watt/Info.plist
        CODE_SIGN_ENTITLEMENTS: Watt/Watt.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        SWIFT_VERSION: "6.0"
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_DEBUG_DYLIB: NO
      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: "Apple Development"
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Developer ID Application: Graham Gilbert (9D8XP85393)"
          CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
    dependencies:
      - package: WattCore
        product: WattCore
      - package: WattHelperProtocol
      - target: WattHelper
        copy:
          destination: executables
        codeSign: true
    postBuildScripts:
      - name: "Embed LaunchDaemons plist and install to /Applications (Debug)"
        script: |
          set -euo pipefail
          # Copy plist into the signed bundle then re-seal only the outer wrapper.
          # We do NOT use --deep so nested binaries (including the helper) are
          # left untouched. The helper was already signed by the prior phase.
          PLIST_DEST="${TARGET_BUILD_DIR}/${PRODUCT_NAME}.app/Contents/Library/LaunchDaemons/com.grahamgilbert.watt.helper.plist"
          mkdir -p "$(dirname "${PLIST_DEST}")"
          cp "${PROJECT_DIR}/WattHelper/Launchd.plist" "${PLIST_DEST}"
          # Re-seal the outer bundle. --no-strict disables the nested-binary
          # check so unsigned debug artifacts don't block the sign.
          /usr/bin/codesign --force \
            --sign "${EXPANDED_CODE_SIGN_IDENTITY}" \
            --entitlements "${PROJECT_DIR}/Watt/Watt.entitlements" \
            --timestamp=none \
            --preserve-metadata=identifier,flags \
            --no-strict \
            "${TARGET_BUILD_DIR}/${PRODUCT_NAME}.app"
          if [ "${CONFIGURATION}" = "Debug" ]; then
            # /Applications/Watt.app is user-owned, so no sudo needed for copy.
            rm -rf /Applications/Watt.app
            ditto "${TARGET_BUILD_DIR}/${PRODUCT_NAME}.app" /Applications/Watt.app
            # Kick launchd so it picks up the new helper binary.
            # Requires root; fail silently if sudo token is not cached.
            sudo -n launchctl kickstart -k system/com.grahamgilbert.watt.helper 2>/dev/null || true
          fi
        basedOnDependencyAnalysis: false
    info:
      path: Watt/Info.plist
      properties:
        CFBundleName: Watt
        CFBundleDisplayName: Watt
        CFBundleIdentifier: com.grahamgilbert.watt
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        CFBundleExecutable: "$(EXECUTABLE_NAME)"
        CFBundlePackageType: APPL
        CFBundleIconFile: AppIcon
        CFBundleIconName: AppIcon
        LSMinimumSystemVersion: "26.0"
        LSUIElement: YES
        NSPrincipalClass: NSApplication
        NSHumanReadableCopyright: "Copyright © 2026 Graham Gilbert"

  WattHelper:
    type: tool
    platform: macOS
    sources:
      - path: WattHelper
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.grahamgilbert.watt.helper
        PRODUCT_NAME: com.grahamgilbert.watt.helper
        INFOPLIST_FILE: WattHelper/Info.plist
        CODE_SIGN_ENTITLEMENTS: WattHelper/WattHelper.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        SKIP_INSTALL: NO
        SWIFT_VERSION: "6.0"
        INSTALL_PATH: "$(LOCAL_LIBRARY_DIR)/LaunchDaemons"
        OTHER_LDFLAGS: "-sectcreate __TEXT __launchd_plist $(PROJECT_DIR)/WattHelper/Launchd.plist -sectcreate __TEXT __info_plist $(PROJECT_DIR)/WattHelper/Info.plist"
        CREATE_INFOPLIST_SECTION_IN_BINARY: YES
      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: "Apple Development"
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Developer ID Application: Graham Gilbert (9D8XP85393)"
          CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
    dependencies:
      - package: WattHelperProtocol
