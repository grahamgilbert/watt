included:
  - Watt
  - WattCore/Sources
  - WattCore/Tests

excluded:
  - .build
  - .swiftpm
  - DerivedData
  - WattCore/.build
  - WattCore/Tests

opt_in_rules:
  - explicit_init
  - first_where
  - force_unwrapping
  - implicit_return
  - prefer_self_type_over_type_of_self
  - redundant_nil_coalescing
  - sorted_first_last
  - toggle_bool

disabled_rules:
  - todo
  - opening_brace
  - trailing_comma
  - identifier_name
  - type_name
  - large_tuple

line_length:
  warning: 160
  error: 240
  ignores_comments: true
  ignores_urls: true
  ignores_function_declarations: true
  ignores_interpolated_strings: true

function_body_length:
  warning: 80
  error: 200

type_body_length:
  warning: 350
  error: 600

file_length:
  warning: 500
  error: 1500

cyclomatic_complexity:
  warning: 15
  error: 25
  ignores_case_statements: true

function_parameter_count:
  warning: 8
  error: 12

force_unwrapping:
  severity: warning

force_cast:
  severity: warning
